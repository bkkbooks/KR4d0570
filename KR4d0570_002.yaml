front:
  text: 跋世所貴於能言者非以其能自為言也穹壤之大古今之異生物之情態殆萬變而無窮能者言之如水之鑑物燭之取影如傳神寫照短長肥瘦老壯勇怯其神情意度邪正醜好或得之一覽之間或索諸冥搜之表要各有以極其趣而後已焉夫豈有窮乎哉百年以來海宇混一往所謂勒燕然封狼居胥以為曠世希有之遇者單車掉臂若在庭户其疆宇所至盡日之所出與日之所沒可謂盛哉楊君以布衣從當世賢士大夫遊襆被出門嵗走萬里耳目所及窮西北之勝其江山人物之形狀殊産異俗之瑰怪朝廷禮樂之偉麗與凡竒節詭行之可警世厲俗者尤喜以詠歌記之使人誦之雖不出井里恍然不自知其道齊魯歷燕趙以出於陰山之陰蹛林之北身履而目擊真豫所謂能言者乎豫索居鄉間聞見甚狹間獨竊愛中臺馬公祖常奎章虞公集翰林栁公貫時能以雄辭妙筆寫其一二今得楊君是集又為增益所未見俯仰今昔又一時矣君其尚有可言者乎而君固已杜門裹足歸老故山方日與田夫野叟相爾汝求以自狎兵燹所過莽為丘墟回視曩逰跬步千里吾知君頺簷敗壁之下滌瓦榼倒鄰釀取舊編與知己者時一諷咏未必不為之慨然以永歎悠然而遐思嵗在玄黓困敦里諸生羅大已敬書於其集之末云灤京雜詠百首元楊允孚所賦讀之當時事宛然如見亦可謂善賦者矣楊文貞家有録本璟常借録於表叔司務公録時草草此本則舍弟璋為豫重録者允孚字和吉出吉水濕塘蓋文貞公故族云成化十三年丁酉春三月望羅璟志
