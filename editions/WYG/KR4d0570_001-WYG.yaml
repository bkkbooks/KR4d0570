body:
  text: 灤京雜咏元楊允孚撰北顧宫庭暑氣清神堯聖禹繼昇平今朝建徳門前馬千里灤京第一程此以下多述途中之景行幸上京蓋云避暑也納寶盤營象輦來畫簾氊煖九重開大臣奏罷行程記萬嵗聲傳龍虎臺龍虎臺納寶地也凡車駕行幸宿頓之所謂之納寶如云巴納宫車次第起昌平燭炬千籠列火城纔入居庸三四里珠簾髙揭聴啼鶯營盤風軟净無沙乳餅羊酥當啜茶底事燕支山下女生平馬上慣琵琶羽獵山陰射白狼太平天子狩封疆峯巒頻轉丹樓穩輦輅初停白晝長居庸千古翠屏環飛騎將軍駐兩關南口北口萬里車書來上國太平弓矢䕶青山穹崖幻出梵王宫雙塔中間一逕通四月雨餘山更碧六龍行䖏日初紅至正年間始營雙塔宫闕巍峩直通絶嶺翎出王侯部落多香風簇簇錦盤陀燕姬翠袖顔如玉自按轅條駕駱駝轅條車前横木按之則輕重前後適均仙峽琴鳴水木多别離見月奈愁何題名石壁遼金字宿雨殘風半滅磨彈琴峽也狼山山下曉風酸掩面佳人半怯寒倚户殷勤喚嘗粥正宜倦客宿征鞍俗賣豆粥榆林御苑栁絲絲昨夜宫車又黒圍宿衛一時金帳巻槍竿珍重白雲飛此處有御苑黒圍地名大駕經由之所俗云龍上槍竿是以御駕不由此䖏斷堤遺址古長城一逕中分萬栁青年少毎忺春酒美詩人偏厭綺羅腥汲井佳人意若何轆轤渾似挽天河我來濯足分餘滴不及新豐酒較多此地慳水故也莫道槍竿危復危有人家住白雲西兒童采棘顛崖去杜宇傷春盡日啼李老谷前山石癯何年此土遂民居老龍若作三更雨頃刻茆簷數尺餘馬上重看尖帽山山頭無數白雲閒漢家天子真龍種坏土長陵為設關乃葬后妃之所設衛卒焉北去雲州去路賖馬䭾殘夢憶京華寒風淅瀝山無數樹影參差月未斜萬古龍門鎮兩京懸崖飛瀑一般清天連翠壁千尋險路繞寒流百折横塞北凝陰無子規曉看山色不勝竒堅氷怪石澗邉路殘月疎星馬上詩東京亭下水濛濛勅賜遊船兩兩紅囘紇舞時杯在手玉奴歸去馬嘶風南國鄉音漸漸稀朔風吹雪上征衣邉鴻飛過桓州去更向窮陰何䖏歸窩名擔子果何如野草黄雲入畫圖弧矢縱懸仍覔侣塞前畨語笑人迂驅車偏嶺客南還始見燕姬笑整鬟誰信片雲三十里寒暄只隔此重山行人到偏頭之北靣不可洗頭不可梳冷極故也過此始有暖意素非髙嶺寒氣止隔於此良可怪也歟李陵臺畔野雲低月白風清狼夜啼健卒五千歸未得至今芳草綠萋萋此地去上京百里許鴛鴦坡上是行宫又喜臨岐象馭通芳草撩人香撲靣白翎隨馬呌晴空由黒圍至此始合轍焉即察罕諾爾白翎草地所産夜宿氊房月滿衣晨餐乳粥椀生肥憑君莫笑穹廬矮男是公侯女是妃歡喜坡邉望禁城鸞翔鳳翥卿雲清舉杯一吸灤陽酒消盡南來百感情此以下叙灤京之景及聖駕往還典故之大槩鐵幡竿下草如茵澹澹東風六月春髙栁豈堪供過客好花留待踏青人即鄂爾多踏青人指宫人也先帝妃嬪哈納房前期承旨達灤陽車如流水毛牛㨗韂鏤黄金白馬良毛牛其毛埀地哈納氊房乃累朝后妃之宫車也聖祖初臨建國城風飛雷動蟄龍驚月生滄海千山白日出扶桑萬國明上京大山傳有龍居之北闕東風昨夜囘今朝瑞氣集蓬萊日光未透香煙起御道聲聲駝鼔來謂駱駝鼓也撒道黄塵輦輅過香焚萬室格天和兩行排列金錢豹竒徹将軍上馬駝又是宫車入御天麗姝歌舞太平年侍臣稱賀天顔喜壽酒諸王次第傳千官至御天門俱下馬徒行獨至尊騎馬直入前有教坊舞女引導且歌且舞舞出天下太平字樣至玉階乃止内門曰御天之門九奏鈞天樂漸收五雲樓閣翠如流宫中又放灤河走相國家奴第一籌灤河至上京二百里走者名桂齊黎明放自灤河至御前巳初中刻者上賞得寵親王馬上囘朱門繡闥一時開淋漓未了金釵宴中使傳宣御酒来大安閣下晚風收海月團團照上頭誰道人間三伏節水晶宫裏十分秋大安閣上京大内也别有水晶殿四傑君前拜不名輪番内直浹辰更蓬萊山上羣仙集得似王孫世祿榮四傑即四集賽也或稱伊克集賽者即大集賽之稱是之謂不名當三問凡所以浃辰一更者也北極修門不暫開兩行宫栁䕶蒼苔有時金鎖因何掣聖駕棕毛殿裏囘棕毛殿在大鄂爾多曙色蒼茫閶闔開相君有奏入蓬萊須臾雲擁千官出又帶天邉好雨來結綵為樓不用扃角聲扶上日初明龍駒河北王來覲直入金門下馬行相國門前栁未花不多嫩綠便藏鴉東風吹得濃陰合散入都城百萬家千官萬騎到山椒個個金鞌雉尾髙下馬一齊催入宴玉闌干外換宫袍每年六月三日詐馬筵席所以喻其盛事也千官以雉尾飾馬入宴錦衣行䖏狻猊習詐馬筵開虎豹良特敇雲和罷絃管君王有意聴堯綱詐馬筵開盛陳竒獸宴享既具必一二大臣稱青吉斯皇帝禮撤於是而後禮有文飲有節矣雲和署𨽻儀鳳司掌天下樂工儀鳳伶官樂既成仙風吹送下蓬瀛花冠簇簇停歌舞獨喜簫韶奏太平儀鳳司天下樂工𨽻焉每宴教坊美女必花冠錦繡以備供奉麗日初明瑞氣開千官錫宴集蓬萊黄門控馬天街立丞相簪花御苑回聿來新貢又殊方重譯寧誇自越裳馴象明珠龜九尾皇王不寶夀無疆萬嵗山有九尾龜嘉魚貢自黒龍江西域蒲萄酒更良南土至竒誇鳳髓北陲異品是黄羊黒龍江産哈巴爾圖魚鳳髓茶名黄羊北方所産御膳用太平天子重文曹閣建奎章選俊髦一自六龍天上去至今黄帕御牀髙昔文宗建奎章閣於大内年深洒掃覩御榻之巋然感而賦此内人調膳侍君王玉仗平明出建章宰輔乍臨閶闔表小臣傳旨賜湯羊御前厨常膳有曰小厨房大厨房小厨房則内人八珍之奉是也大厨房則宣徽所掌湯羊是也由内及外外膳既畢羣臣始入奏事每湯羊一膳具數十六餐餘必賜左右大臣日以為常予常職賜故悉其詳曲曲闌干鹿馴雨肥綠草度青春生來不避韓盧獵慣識金衣内貴人銀蹄天馬衣氍毹肉食尋常斗酒俱可惜東游巡海者不教騎看試何如仙娥隠約上簾鈎笑倚䦨干出殿頭鸚鵡臨階呼萬嵗白翎深院度清秋宫人兩兩凭䦨干又喜新除内監寛金線蹙花鞾様小免教羅襪步輕寒澹墨輕黄淺畫眉小絨縧子翠羅衣君王又幸西宫去齊向花陰鬭草歸香車七寶固姑袍旋摘修翎付女曹别院笙歌承宴早御園花簇小金桃凡車中戴固姑其上羽毛又尺許㧞付女侍手持對坐車中雖后妃駝象亦然窈窕仙姝出禁闈小西門外緑楊堤五陵公子多豪縱緩勒驕驄不敢嘶鳳樓春煖翠重重内禁門開曉日紅寶馬香車金錯節太平公主幸離宫侯王甲第五雲堆秦虢夫人夜宴開馬上琵琶仍按拍真珠皮帽女郎囘湯羊内膳日差排紅帖呼名到玉階底事金吾呵不住腰間懸得象牙牌東城無樹起西風百折河流遶塞通河上驅車應昌府月明偏照魯王宫官妓平明直禁闈瑶階上馬月明歸宫花飛落春衫袖辛苦桑麻入夢稀内宴重開馬湩澆嚴程有旨出丹霄羽林衛士桓桓集太僕龍車欵欵調馬湩馬妳子也毎年八月開馬妳子宴始奏起程太僕寺掌馬者鸞輿八月政髙翔玉勒雕鞌萬騎忙天上龍歸纔帶雨城頭夜午又經霜毎年駕起其夕即霜異哉南坡煖翠按南屛雲散風輕弄午晴寄與行人停去馬六龍飛上計歸程南坡乃巴納地也故遊人罕至焉月出王孫獵兎忙玉驄拾矢戲沙塲皮囊乳酒鑼鍋肉奴視山陰對角羊橘綠羊或四角六角者謂之迭角羊迭義未詳以其角之相對故曰對角毛角雖竒香味稍别故不升之鼎爼于以見天朝之玉食有等差也良馬驟馳拾墮箭雍容環珮肅千官空設番僧止雨壇自是半晴天氣好螺聲吹起宿雲寒西番種類不一毎即殊禮燕享大㑹則設止雨壇於殿隅時因所見以發一哂正元紫禁肅朝儀御榻中間寶帕提王母夀詞歌未徹雪花片片彩雲低此以下多叙一年之景并雜咏之物元夕華燈帶雪看佳人翠䄂自禁寒生平不作蠶桑計只解青驄鞴繡鞌試數窻間九九圖餘寒消盡煖囘初梅花㸃遍無餘白看到今朝是杏株冬至後貼梅花一枝於窻間佳人曉粧時以臙脂日圖一圈八十一圈既足變作杏花即煖囘矣脫圈窈窕意如何羅綺香風漾綠波信是唐宫行樂䖏水邉三月麗人多上巳日灤京士女競作綵圈臨水棄之即修褉之義也蒲萄萬斛壓香醪華屋神仙意氣豪酬節凉糕猶末品内家先散小絨縧重午節也百戲㳺城又及時西方佛子閲宏規綵雲隠隠旌旗過翠閣深深玉笛吹每年六月望日帝師以百戲入内從西華門入然後登城設宴謂之㳺皇城是也紫菊花開香滿衣地椒生䖏乳羊肥氊房納實茶添火有女褰裳拾糞歸紫菊花惟灤京有之名公多見題品地椒草牛羊食之其肉香肥納實䝉古茶為愛琵琶調有情月髙未放酒杯停新腔翻得凉州曲彈出天鵝避海青海青挐天鵝新聲也海紅不似花紅好杏子何如巴欖良更說髙麗生菜美總輸山後蘑菰香海紅花紅巴欖皆果名髙麗人以生菜裹飯食之尖山産蘑菰四月東風漸漸和流波細細出官河詩人策馬紅橋過御栁今朝緑較多偶因試馬小盤桓明徳門前御道寛樓下綠楊樓上酒年年萬國㑹衣冠明德門午門也怪得家僮笑語囘門前驚見事竒哉老翁攜䑕街頭賣碧眼黄髯騎象來黄䑕灤京竒品一曲琵琶可奈何昭君青塚恨消磨可憐滿地黄雲起不似連天芳草多翠樓紫閣盡崔巍花落花開不用催最是多情天上月照人西去又東來承恩留守是何王錦帳成圍促宴忙却怪西風渾不顧一般吹送滿頭霜不須白粲備晨炊乳酪羊酥塞北竒泥土炕牀銀甕酒佳人椎髻語侏離東風亦肯到天涯燕子飛来相國家若較内園紅芍藥洛陽輸却牡丹花内園芍藥彌望亭亭直上數尺許花大如斗揚州芍藥稱第一終不及上京也賣酒人家隔巷深紅橋正在綠楊陰佳人停繡憑闌立公子簮花倚馬吟白白氊房撒萬星名王酣宴惜娉婷李陵臺北連天草直到開平縣裏青東風吹暖栁如煙寄語行人緩著鞭燕舞巧防鴉鶻落馬嘶驚起駱駝眠時雨初肥芍藥苖脆甘味壓酒腸消揚州簾捲東風裏曾惜名花第一嬌草地芍藥初生軟美居人多采食之霜寒塞月青山瘦草實平坡黄䑕肥欲問前朝開宴䖏白頭宫使往還稀文宗曽開宴於南坡故云雖然玉宇桂無花秋比江南分外佳絃管畫樓人散去舍郎攜妓勸嘗𤓰俗以月下送𤓰果往還上京不産桂花御饌官厨不較餘金門掌膳意勤如更分光祿瓶中酒爛醉歸時月上初凡御膳及民間者謂之貢餘光祿寺掌御酒别却郎君可奈何教坊有令趣興和當時不信郵亭怨始覺郵亭怨轉多興和署迺教坊司属掌天下優人窈窕誰家女未笄日髙停繡出簾帷背人笑指青霄上認得宫庭白鴿飛百事關心有許忙秋風掠削鬢邊凉曉来為憶西山雨怕看行人歸故鄉灤京九月雪花飛香壓萸囊與夢違雁字不来家萬里狐裘旋買換征衣雪深連月與簷齊誰把新吟向客題一字成時筆如鐵不如載酒畫樓西出塞書生瘦馬騎野雲片片故相隨凍生耳鼻雪堪理冷入肝腸酒强支凡凍耳鼻即以雪揉之方囘近火則脱䝉茸貂帽豁雙眸欲識渠儂語漫求土屋人人愁出户書生日日懶梳頭與客飛觴夜討論夢囘猶自酒㣲醺一天星斗三更月白雪飛花何處雲宫監何年百念銷冠簮驚見髻蕭蕭挑燈細說前朝事客子朱顔一夕凋買得香梨鐵不如玻瓈椀裏凍潛蘇書生半醉思南土一曲鐙前唱鷓鴣梨子受凍其堅如鐵以井水浸之則味囘可食始我來京一布衣故人曾見未生時等閒只作江南别官有清名巻有詩我憶江南好夢稀江山於我故多違離愁萬斛無人管載得殘詩馬上歸强欲澆愁酒一巵解鞍閒看古祠碑居庸千載興亡事惟有天中月色知塞邉羝牧長兒孫水草全枯乳酪存不識江南有阡陌一犁烟雨自黄昏急管繁絃别畫樓一杯還遞一杯愁洛中惆悵路千里塞上凄凉月半鈎帝里風光入夢頻鳳城金闕一般春故鄉不是無秋雨聽過穹廬始愴神試將往事記從頭老鬢征衫總是愁天上人間今又昔灤河珍重水長流玉京慣識别離人勒馬雲關隔世塵不比江南花事早家家兒女解傷春灤京雜咏
