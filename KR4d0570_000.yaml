body:
  text: 灤京雜詠别集類四元提要臣等謹案灤京雜詠一卷元楊允孚撰允孚字和吉吉水人其始末未詳惟集後羅大巳跋稱楊君以布衣襆被嵗走萬里窮西北之勝凡山川物産典章風俗無不以詠歌紀之則允孚似未登仕版者然第四十九首注稱每湯羊一膳具數十六餐餘必賜左右大臣日以為常豫嘗職賜故悉其詳云云則亦順帝時尚食供奉之官非逰士矣又末數首中一則曰宫監何年百念消冠簪驚見髻蕭蕭挑燈細説前朝事客子朱顔一夕凋一則曰強欲澆愁酒一巵解鞍間看古祠碑居庸十載興亡事惟有天中月色知一則曰試將往事記從頭老鬢征衫總是愁天上人間今又昔灤河珍重水長流則是集作於入明之後矣其詩凡一百八首題曰百詠蓋舉成數其曰灤京者以灤河徑上都城南故元時亦有此稱詩中所記元一代避暑行幸之典多史所未詳其詩下自注亦皆賅悉蓋其體本王建宫詞而故宫禾黍之感則與孟元老之東京夢華録吳自牧之夢梁録周密之武林舊事同一用意矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0b9a6e51830802862fdc577e52e992f91761b5bb7624bdce3d8273464696eb2a
